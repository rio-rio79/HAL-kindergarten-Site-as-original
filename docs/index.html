<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アクセス</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link
      href="https://db.onlinewebfonts.com/c/aac28a8d3a17309e7f5bd19aadcd7915?family=Post+No+Bills+Colombo+ExtraBold"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- header -->
    <header class="site-header">
      <div class="header-inner">
        <!-- ロゴ -->
        <a class="header-logo" href="index.html">
          <img src="images/ハル幼稚園_logo1.png" alt="幼稚園ロゴ" />
        </a>

        <!-- 右側 -->
        <div class="header-actions">
          <a class="contact-button" href="contact.html">お問い合わせ</a>

          <!-- ハンバーガー（常時表示） -->
          <button
            class="hamburger-button"
            type="button"
            aria-label="メニューを開く"
            aria-controls="global-menu"
            aria-expanded="false"
          >
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
          </button>
        </div>
      </div>

      <!-- ドロワー -->
      <nav id="global-menu" class="global-menu" aria-label="グローバルメニュー">
        <ul class="global-menu-list">
          <li><a href="index.html#about">園について</a></li>
          <li><a href="index.html#experience">園の特色</a></li>
          <li><a href="index.html#projects">活動紹介</a></li>
          <li><a href="contact.html">お問い合わせ</a></li>
        </ul>
      </nav>

      <div class="menu-overlay" aria-hidden="true"></div>
    </header>

    <!-- メイン -->
    <main class="top-main">
      <!-- メインビジュアル -->
      <section class="top-main_hero" aria-label="メインビジュアル">
        <img
          class="top-main_heroImg"
          src="images/12.jpg"
          alt="園の活動の様子"
        />
      </section>

      <!-- お知らせバー -->
      <section class="top-main_notice" aria-label="お知らせ">
        <div class="top-main_noticeInner">
          <div class="top-main_noticeLeft">
            <p class="top-main_noticeTitle">園からのお知らせ</p>
            <p class="top-main_noticeText">
              子どもたちにも大人気！春の園庭が完成しました！
            </p>
          </div>

          <a class="top-main_noticeBtn" href="news.html">詳細はこちら →</a>
        </div>
      </section>

      <!-- 4カード -->
      <section class="top-main_cards" aria-label="メニュー">
        <a class="top-main_card" href="activity.html">
          <div class="top-main_cardImgWrap">
            <img
              class="top-main_cardImg"
              src="images/26.jpg"
              alt="幼稚園での生活"
            />
          </div>
          <p class="top-main_cardLink">幼稚園での生活→</p>
        </a>

        <a class="top-main_card" href="index.html">
          <div class="top-main_cardImgWrap">
            <img
              class="top-main_cardImg"
              src="images/16.jpg"
              alt="年間行事について"
            />
          </div>
          <p class="top-main_cardLink">年間行事について→</p>
        </a>

        <a class="top-main_card" href="About.html">
          <div class="top-main_cardImgWrap">
            <img
              class="top-main_cardImg"
              src="images/園長 - サムネ.png"
              alt="ハル幼稚園について"
            />
          </div>
          <p class="top-main_cardLink">ハル幼稚園について→</p>
        </a>

        <a class="top-main_card" href="access.html">
          <div class="top-main_cardImgWrap">
            <img
              class="top-main_cardImg"
              src="images/01.jpg"
              alt="交通アクセス"
            />
          </div>
          <p class="top-main_cardLink">交通アクセス→</p>
        </a>
      </section>
    </main>
    <!-- footer -->
    <footer class="site-footer">
      <div class="footer-inner">
        <!-- ロゴ（左） -->
        <a class="footer-brand" href="index.html" aria-label="トップへ">
          <img
            class="footer-logo"
            src="images/ハル幼稚園_logo2.png"
            alt="ハル幼稚園 ロゴ"
          />
        </a>

        <!-- ナビ（右） -->
        <nav class="footer-nav" aria-label="フッターナビゲーション">
          <a class="footer-link" href="index.html#about">お知らせ</a>
          <a class="footer-link" href="index.html#experience"
            >ハル幼稚園について</a
          >
          <a class="footer-link" href="index.html#projects">事業案内</a>
          <a class="footer-link" href="contact.html">施設紹介</a>
          <a class="footer-link" href="contact.html">採用情報</a>
        </nav>
      </div>
    </footer>
    <script src="style.js"></script>
    <!-- ここまでフッター -->
  </body>
</html>
